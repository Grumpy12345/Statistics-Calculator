<!DOCTYPE html>

<html lang="en">
    <head>
        <title>Statistics Calculator</title>
        <meta charset="utf-8">
        <link href="style.css" rel="stylesheet">
        <script src="script.js" defer></script>
    </head>

    <body>
        <section class="container">
            <section class="heading">
                <h1>Statistics Calculator</h1>
            </section>

            <section class="input-area">
                <input type="text" id="input-values" placeholder="Input values here">
                <button id="submit">Calculate statistics</button>
            </section>

            <section class="output">
                <span id="location-measures"></span>
                <br>
                <!--Location measures are mean, median, and mode-->
                <span id="spread-measures"></span>
                <br>
                <!--Spread measures are range, interquartile range, and standard deviation-->
                <span id="five-number-summary"></span>
                <br>
                <!--Minimum, Q1, Q2, Q3, and maximum-->
            </section>
        </section>
    </body>
</html>
